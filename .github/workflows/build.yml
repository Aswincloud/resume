name: Build & Deploy Resume

on:
  push:
    branches: [main]
    paths: ['resume.html', 'photo.jpg', 'build.sh', 'site/**', '.github/workflows/build.yml']
  pull_request:
    paths: ['resume.html', 'photo.jpg', 'build.sh', 'site/**', '.github/workflows/build.yml']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # to post the preview URL as a PR comment

concurrency:
  # Per-ref: a push to main and a PR build don't cancel each other.
  group: resume-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        id: chrome

      - name: Install fonts (Liberation Sans)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-liberation

      - name: Render PDF
        run: BROWSER='${{ steps.chrome.outputs.chrome-path }}' ./build.sh

      - name: Sanity-check output
        run: test -s Aswin_Resume.pdf && file Aswin_Resume.pdf

      # Assemble the static site Cloudflare Pages will serve.
      #   index.html  -> inline PDF viewer
      #   Aswin_Resume.pdf -> the download target (resume.aswincloud.com/Aswin_Resume.pdf)
      - name: Assemble site
        run: |
          mkdir -p _site
          cp site/index.html _site/index.html
          cp Aswin_Resume.pdf _site/Aswin_Resume.pdf

      # Deploy to Cloudflare Pages.
      #   branch == main  -> production (resume.aswincloud.com)
      #   any other ref   -> a preview deployment with its own *.pages.dev URL
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy _site
            --project-name=aswin-resume
            --branch=${{ github.head_ref || github.ref_name }}

      # On PRs, surface the preview URL as a sticky comment.
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: resume-preview
          message: |
            ### 📄 Resume preview

            Rendered from `resume.html` on this branch:

            - **View:** ${{ steps.deploy.outputs.deployment-url }}
            - **Branch alias:** ${{ steps.deploy.outputs.pages-deployment-alias-url }}

            Production (`resume.aswincloud.com`) updates when this PR merges to `main`.
