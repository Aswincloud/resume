name: Build & Release Resume

on:
  push:
    branches: [main]
    paths: ['resume.html', 'photo.jpg', 'build.sh', 'site/**', '.github/workflows/build.yml']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: resume-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        id: chrome

      - name: Install fonts (Liberation Sans)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-liberation

      - name: Render PDF
        run: BROWSER='${{ steps.chrome.outputs.chrome-path }}' ./build.sh

      - name: Sanity-check output
        run: test -s Aswin_Resume.pdf && file Aswin_Resume.pdf

      # One fresh tag per build. The org enforces immutable releases, so we never
      # mutate an existing release — each run creates a new one and marks it latest,
      # keeping the releases/latest/download/... URL pointing at the newest PDF.
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Resume — build ${{ github.run_number }}
          body: |
            Auto-built from `resume.html`.
            Commit ${{ github.sha }}.
          files: Aswin_Resume.pdf
          make_latest: true

      # Publish a browser-viewable copy to GitHub Pages.
      # Pages serves the PDF with Content-Type application/pdf (no attachment
      # disposition), so it renders inline instead of downloading.
      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp site/index.html _site/index.html
          cp site/CNAME _site/CNAME
          cp Aswin_Resume.pdf _site/Aswin_Resume.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
